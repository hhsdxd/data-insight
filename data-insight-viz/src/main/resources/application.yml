server:
  port: 8084

spring:
  application:
    name: data-insight-viz
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml

logging:
  level:
    com.datainsight: debug
