server:
  port: 8082

spring:
  application:
    name: data-insight-parser
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    url: jdbc:mysql://localhost:3306/data_insight_parser?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml

# RocketMQ（开发阶段注释掉或使用 fallback）
rocketmq:
  name-server: ${ROCKETMQ_ADDR:localhost:9876}
  producer:
    group: data-insight-producer

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.datainsight: debug
